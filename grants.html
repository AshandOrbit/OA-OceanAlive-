const today = new Date('2026-02-24');
function daysUntil(d) { return Math.ceil((new Date(d) - today) / 864e5); }
function fmtCD(d) {
  const n = daysUntil(d);
  if (n < 0) return { t: `${Math.abs(n)}d ago`, c: 'urgent' };
  if (n <= 30) return { t: `${n}d`, c: 'urgent' };
  if (n <= 90) return { t: `${n}d`, c: 'soon' };
  return { t: `${n}d`, c: 'comfortable' };
}
function monthOf(d) { return new Date(d).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
function prioLabel(p) { return {critical:'Critical',high:'High',medium:'Medium',low:'Low'}[p]||p; }
function catLabel(c) { return {eu:'EU',national:'National (PT)',intl:'International/Multilateral',corporate:'Corporate',foundation:'Private Foundation'}[c]||c; }

function ActionsView({grants, onToggle}) {
  const urgent=[], active=[], watching=[];
  grants.forEach(g => g.actions.forEach((a,i) => {
    const item = {...a, gid:g.id, gname:g.name, gprio:g.priority, gstat:g.status, ai:i, dl:g.deadlineLabel};
    if (g.priority==='critical'&&!a.done) urgent.push(item);
    else if ((g.status==='preparing'||g.status==='drafting')&&!a.done) active.push(item);
    else watching.push(item);
  }));

  function Section({title,icon,color,items}) {
    if (!items.length) return null;
    return React.createElement('div', {className:'action-section'},
      React.createElement('div', {className:'action-section-header'},
        React.createElement('div', {className:'action-section-icon', style:{background:color}}, icon),

      items.map((item,i) =>
        React.createElement('div', {key:`${item.gid}-${item.ai}-${i}`, className:'action-card'},

function BudgetView({grants}) {
  const eu = grants.filter(g=>g.category==='eu').sort((a,b)=>b.budgetNum-a.budgetNum);

  const intl = grants.filter(g=>g.category==='intl'||g.category==='corporate'||g.category==='foundation').sort((a,b)=>b.budgetNum-a.budgetNum);
  const euT = eu.reduce((s,g)=>s+g.budgetNum,0);
